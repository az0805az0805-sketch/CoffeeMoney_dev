<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>当月の詳細</title>

	<!-- 外部 CSS を読み込む -->
	<link rel="stylesheet" th:href="@{/css/records.css}">
</head>

<body>
	<h2>当月の詳細</h2>

	<table>
		<tr>
			<th>日付</th>
			<th>種類</th>
			<th>金額</th>
			<th>削除</th>
		</tr>

		<tr th:each="record : ${records}">
			<td th:text="${#temporals.format(record.createdAt, 'yyyy-MM-dd')}"></td>
			<td th:text="${record.item.name}"></td>
			<td th:text="${record.amount}"></td>

			<td>
				<form action="/delete-record" method="post">
					<input type="hidden" name="recordId" th:value="${record.id}">
					<input type="hidden" name="categoryId" th:value="${categoryId}">
					<button type="submit" class="delete-button">削除</button>
				</form>

			</td>
		</tr>
		<!-- レコードが 0 件のとき -->
		<tr th:if="${records.size() == 0}">
			<td colspan="4" style="text-align:center; padding: 20px;">
				この月の記録はありません
			</td>
		</tr>
	</table>

	<div class="summary-box">
		<p>合計金額：<span th:text="${monthlyTotal}"></span> 円</p>
		<p>予算：<span th:text="${budget}"></span> 円</p>
		<p>残高：<span th:text="${balance}"></span> 円</p>
	</div>

	<a th:href="@{/month-select(categoryId=${categoryId})}" class="link-button">他の月を見る</a>
	<a th:href="@{/count(categoryId=${categoryId})}" class="detail-button">戻る</a>


</body>

</html>

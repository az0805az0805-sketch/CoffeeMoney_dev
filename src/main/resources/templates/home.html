<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>CoffeeMoney</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>

	<h2> CoffeeMoney </h2>
	<p>ちょっとした支出カウントアプリ<br>
		ちょこちょこ買うものが月間でいくらになるのかカウントしてみよう</p><br>
	<p class="blink select-title">↓SELECT CATEGORY↓</p>

	<div class="category-row" th:each="cat : ${categories}">

		<!-- カテゴリーボタン -->
		<a th:href="@{/summary-top(categoryId=${cat.id})}" class="category-button">
			<span th:text="${cat.name}"></span>
		</a>

		<!-- 更新ボタン -->
		<a th:href="@{/category/edit(id=${cat.id})}" class="edit-button">更新</a>

		<!-- 削除ボタン -->
		<form th:action="@{/category/delete}" method="post"
			onsubmit="return confirmDelete('このカテゴリーを削除すると関連アイテムも消えます。削除しますか？');">
			<input type="hidden" name="categoryId" th:value="${cat.id}">
			<button type="submit" class="delete-button">削除</button>
		</form>

	</div>

	<hr>

	<a th:href="@{/category-add}">カテゴリーを追加する</a>

	<script src="/deletemes.js"></script>
</body>

</html>
